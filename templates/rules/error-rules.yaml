# 错误处理规范
# 基于 OWASP Error Handling Cheat Sheet — 语言无关
# https://cheatsheetseries.owasp.org/cheatsheets/Error_Handling_Cheat_Sheet.html

rules:
  - id: "E001"
    description: "必须设置全局异常处理机制（语言/框架无关：如 Express error middleware / Spring @ControllerAdvice / Django middleware / Go recover middleware / Rust actix ErrorHandler）。禁止让框架默认错误页或裸堆栈跟踪暴露给最终用户。"
    reference: "OWASP Error Handling Cheat Sheet"
    applies_to: "backend"
    enforcement: "BLOCK_AND_WARN"

  - id: "E002"
    description: "向客户端返回语义正确的 HTTP 状态码：4xx = 客户端错误（参数问题、权限不足），5xx = 服务端错误（内部异常）。5xx 响应体中不返回内部实现细节。"
    applies_to: "api"
    enforcement: "WARN"

  - id: "E003"
    description: "用户可见的错误信息使用业务语言（如'用户名或密码错误'）。禁止暴露技术细节（如数据库连接信息、内部 IP、SQL 查询内容、表结构）。"
    applies_to: "backend"
    enforcement: "BLOCK_AND_WARN"

  - id: "E004"
    description: "所有异常在服务端必须记录完整上下文（堆栈跟踪、请求参数、用户标识、时间戳），但仅供运维查看。日志中禁止包含密码、令牌等敏感数据。"
    applies_to: "backend"
    enforcement: "REVIEW_SUGGESTION"

  - id: "E005"
    description: "API 错误响应推荐使用结构化格式（如 RFC 7807 Problem Details 格式），包含 type、title、status、detail 等字段，便于客户端程序化处理错误。"
    reference: "RFC 7807"
    applies_to: "api"
    enforcement: "STYLE"

  - id: "E006"
    description: "捕获具体异常类型，针对不同异常做不同处理。避免捕获所有异常的宽泛 catch（catch-all）而不做分类处理。空的 catch 块等于吞掉错误，禁止。"
    applies_to: "backend"
    enforcement: "WARN"

  - id: "E007"
    description: "异步操作中的错误必须被捕获并传播。根据语言特性使用相应机制：Promise.catch() / try-catch (async/await) / Go error channel / Rust Result propagation / Python asyncio 异常处理。禁止静默丢失异步错误。"
    applies_to: "backend"
    enforcement: "BLOCK_AND_WARN"
