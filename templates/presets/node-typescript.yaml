# Preset: node-typescript
# 基于 Prettier 3.x 默认值 + Conventional Commits 1.0.0
# 适用: Node.js, TypeScript, JavaScript, React, Next.js, Vue, Svelte, Express, NestJS

name: node-typescript
description: "Node.js / TypeScript / JavaScript 生态"

match:
  - node
  - typescript
  - ts
  - javascript
  - js
  - react
  - next
  - next.js
  - vue
  - svelte
  - express
  - nest
  - nestjs
  - vite
  - electron

conventions:
  git:
    commit_style: conventional
    branch_naming: "feature/<name>"
    pr_title_prefix: ""
    sign_commits: false

  code:
    indent: 2
    quotes: double
    semicolons: true
    trailing_commas: all
    max_line_length: 80

  naming:
    files: kebab-case
    functions: camelCase
    classes: PascalCase
    constants: UPPER_SNAKE_CASE
    variables: camelCase
    react_components: PascalCase

  imports:
    order: [third-party, internal, relative]
    allow_unused: false

  comments:
    language: zh-CN
    require_jsdoc: false
    require_function_comments: true

testing:
  framework: vitest
  coverage_threshold: 80
  require_integration_tests: true

aios:
  strict_mode: true
  auto_archive: false
  require_human_review: true
  language: zh-CN
  coexistence_mode: ask
